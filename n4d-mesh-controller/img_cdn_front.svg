<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arr-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#eab308"/>
    </marker>
    <marker id="arr-dim" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#484f58"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="580" fill="#0a0c10"/>

  <!-- Title -->
  <text x="600" y="36" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#e6edf3" text-anchor="middle">THREE-PORT C2 ENTRY STACK — cdnorigin.net CDN FRONT</text>
  <text x="600" y="58" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="normal" fill="#8b949e" text-anchor="middle">All three ports proxy to the same FastAPI backend — resilience by redundancy, camouflage by domain</text>

  <!-- ===== INTERNET SIDE (left) ===== -->
  <!-- Internet cloud box -->
  <rect x="24" y="80" width="200" height="440" rx="8" fill="#0f1117" stroke="#21262d" stroke-width="1.5"/>
  <text x="124" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#8b949e" text-anchor="middle">INTERNET</text>

  <!-- Agent client -->
  <rect x="44" y="120" width="160" height="50" rx="6" fill="#161b22" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="124" y="140" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#3b82f6" text-anchor="middle">BOT AGENT</text>
  <text x="124" y="157" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="normal" fill="#8b949e" text-anchor="middle">Go-http-client/1.1</text>

  <!-- Operator client -->
  <rect x="44" y="200" width="160" height="50" rx="6" fill="#161b22" stroke="#a855f7" stroke-width="1.5"/>
  <text x="124" y="220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#a855f7" text-anchor="middle">OPERATOR</text>
  <text x="124" y="237" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="normal" fill="#8b949e" text-anchor="middle">X-Operator-Key</text>

  <!-- Browser/scanner -->
  <rect x="44" y="280" width="160" height="50" rx="6" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="124" y="300" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#8b949e" text-anchor="middle">BROWSER / SCANNER</text>
  <text x="124" y="317" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="normal" fill="#484f58" text-anchor="middle">No API path</text>

  <!-- Victim new beacon -->
  <rect x="44" y="360" width="160" height="50" rx="6" fill="#161b22" stroke="#ff4444" stroke-width="1.5"/>
  <text x="124" y="380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#ff4444" text-anchor="middle">NEW VICTIM</text>
  <text x="124" y="397" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="normal" fill="#8b949e" text-anchor="middle">beacon.sh / qq_watcher</text>

  <!-- ===== PROXY LAYER (center) ===== -->
  <!-- Port 443 proxy - top -->
  <rect x="310" y="90" width="240" height="100" rx="8" fill="#0f1117" stroke="#22c55e" stroke-width="2"/>
  <rect x="310" y="90" width="240" height="28" rx="8" fill="#22c55e" stroke="none"/>
  <rect x="310" y="108" width="240" height="10" rx="0" fill="#22c55e" stroke="none"/>
  <text x="430" y="108" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="bold" fill="#0a0c10" text-anchor="middle">:443  tls_proxy.py</text>
  <text x="430" y="135" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="bold" fill="#22c55e" text-anchor="middle">TLS TERMINATION</text>
  <text x="430" y="153" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e" text-anchor="middle">SNI: cdnorigin.net</text>
  <text x="430" y="169" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">RSA-2048 · self-signed · 10yr</text>

  <!-- Key exposed badge on :443 -->
  <rect x="450" y="92" width="96" height="18" rx="3" fill="#ff4444" stroke="none"/>
  <text x="498" y="105" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">KEY EXPOSED</text>

  <!-- Port 80 proxy - middle -->
  <rect x="310" y="220" width="240" height="80" rx="8" fill="#0f1117" stroke="#f97316" stroke-width="1.5"/>
  <rect x="310" y="220" width="240" height="28" rx="8" fill="#f97316" stroke="none"/>
  <rect x="310" y="238" width="240" height="10" rx="0" fill="#f97316" stroke="none"/>
  <text x="430" y="238" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="bold" fill="#0a0c10" text-anchor="middle">:80   http_proxy.py</text>
  <text x="430" y="265" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="bold" fill="#f97316" text-anchor="middle">PLAIN HTTP FORWARD</text>
  <text x="430" y="283" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Fallback — no encryption</text>

  <!-- Port 8443 direct - bottom -->
  <rect x="310" y="330" width="240" height="80" rx="8" fill="#0f1117" stroke="#eab308" stroke-width="1.5"/>
  <rect x="310" y="330" width="240" height="28" rx="8" fill="#eab308" stroke="none"/>
  <rect x="310" y="348" width="240" height="10" rx="0" fill="#eab308" stroke="none"/>
  <text x="430" y="348" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="bold" fill="#0a0c10" text-anchor="middle">:8443  DIRECT</text>
  <text x="430" y="375" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="bold" fill="#eab308" text-anchor="middle">FASTAPI DIRECT</text>
  <text x="430" y="393" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Bot HMAC auth · all /api/ paths</text>

  <!-- CDN Camouflage box -->
  <rect x="310" y="440" width="240" height="68" rx="8" fill="#0f1117" stroke="#484f58" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="430" y="466" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="bold" fill="#484f58" text-anchor="middle">CDN CAMOUFLAGE LAYER</text>
  <text x="430" y="483" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#484f58" text-anchor="middle">Non-/api/ path → 302 redirect</text>
  <text x="430" y="499" font-family="'Courier New',Courier,monospace" font-size="10" fill="#484f58" text-anchor="middle">→ https://www.imperva.com/</text>

  <!-- ===== BACKEND (right) ===== -->
  <rect x="650" y="140" width="240" height="260" rx="8" fill="#0f1117" stroke="#3b82f6" stroke-width="2"/>
  <rect x="650" y="140" width="240" height="32" rx="8" fill="#3b82f6" stroke="none"/>
  <rect x="650" y="162" width="240" height="10" rx="0" fill="#3b82f6" stroke="none"/>
  <text x="770" y="162" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">controller_v4.py</text>
  <text x="770" y="192" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#e6edf3" text-anchor="middle">FastAPI / Uvicorn</text>
  <text x="770" y="210" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Port :8443 (internal)</text>

  <line x1="670" y1="230" x2="860" y2="230" stroke="#21262d" stroke-width="1"/>

  <text x="770" y="252" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3b82f6" text-anchor="middle">POST /api/register</text>
  <text x="770" y="269" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3b82f6" text-anchor="middle">GET  /api/task/{nid}</text>
  <text x="770" y="286" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3b82f6" text-anchor="middle">POST /api/result/{nid}</text>
  <text x="770" y="303" font-family="'Courier New',Courier,monospace" font-size="10" fill="#a855f7" text-anchor="middle">GET  /api/intel (operator)</text>
  <text x="770" y="320" font-family="'Courier New',Courier,monospace" font-size="10" fill="#ff4444" text-anchor="middle">GET  /api/beacon (open)</text>
  <text x="770" y="337" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3b82f6" text-anchor="middle">GET  /api/agent/binary</text>
  <text x="770" y="354" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e" text-anchor="middle">GET  /robots.txt → Disallow</text>

  <!-- PostgreSQL -->
  <rect x="970" y="195" width="200" height="90" rx="8" fill="#0f1117" stroke="#8b949e" stroke-width="1.5"/>
  <text x="1070" y="220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#e6edf3" text-anchor="middle">PostgreSQL</text>
  <text x="1070" y="238" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e" text-anchor="middle">dbname=n4d</text>
  <text x="1070" y="255" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">nodes · tasks · intel</text>
  <text x="1070" y="272" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">deploys · chain_tasks</text>

  <!-- ===== ARROWS ===== -->
  <!-- Client → port 443 -->
  <line x1="208" y1="140" x2="308" y2="130" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- Client → port 80 -->
  <line x1="208" y1="155" x2="308" y2="258" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <!-- Client → port 8443 -->
  <line x1="208" y1="170" x2="308" y2="360" stroke="#eab308" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <!-- Operator → port 8443 (X-Operator-Key) -->
  <line x1="208" y1="220" x2="308" y2="380" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- Port 443 → FastAPI -->
  <line x1="552" y1="140" x2="648" y2="220" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- Port 80 → FastAPI -->
  <line x1="552" y1="260" x2="648" y2="250" stroke="#f97316" stroke-width="2" marker-end="url(#arr-orange)"/>
  <!-- Port 8443 → FastAPI -->
  <line x1="552" y1="370" x2="648" y2="280" stroke="#eab308" stroke-width="2" marker-end="url(#arr-yellow)"/>

  <!-- Camouflage redirect arrow (going right then down) -->
  <line x1="552" y1="475" x2="648" y2="475" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-dim)"/>
  <text x="655" y="471" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#484f58" text-anchor="start">302 → imperva.com</text>

  <!-- Browser → camouflage layer -->
  <line x1="208" y1="305" x2="308" y2="475" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-dim)"/>

  <!-- FastAPI → PostgreSQL -->
  <line x1="892" y1="250" x2="968" y2="240" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Victim → port 443 -->
  <line x1="208" y1="385" x2="308" y2="160" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arr-red)"/>

  <!-- ===== LABELS ===== -->
  <!-- Port labels on arrows -->
  <text x="238" y="116" font-family="'Courier New',Courier,monospace" font-size="10" fill="#22c55e" text-anchor="middle">:443</text>
  <text x="250" y="218" font-family="'Courier New',Courier,monospace" font-size="10" fill="#f97316" text-anchor="middle">:80</text>
  <text x="252" y="293" font-family="'Courier New',Courier,monospace" font-size="10" fill="#eab308" text-anchor="middle">:8443</text>
  <text x="260" y="207" font-family="'Courier New',Courier,monospace" font-size="9" fill="#a855f7" text-anchor="middle">X-Operator-Key</text>

  <!-- Bottom stats bar -->
  <rect x="24" y="524" width="1152" height="44" rx="6" fill="#0f1117" stroke="#21262d" stroke-width="1"/>
  <rect x="36" y="535" width="14" height="14" rx="2" fill="#22c55e"/>
  <text x="56" y="546" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#8b949e" text-anchor="start">:443 — TLS, cdnorigin.net cert (PRIVATE KEY EXPOSED)</text>
  <rect x="390" y="535" width="14" height="14" rx="2" fill="#f97316"/>
  <text x="410" y="546" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#8b949e" text-anchor="start">:80 — Plain HTTP forward</text>
  <rect x="636" y="535" width="14" height="14" rx="2" fill="#eab308"/>
  <text x="656" y="546" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#8b949e" text-anchor="start">:8443 — Direct FastAPI (all three proxy to this)</text>
  <rect x="36" y="552" width="14" height="14" rx="2" fill="#484f58"/>
  <text x="56" y="563" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#8b949e" text-anchor="start">CDN camouflage: non-/api/ paths → 302 to imperva.com — makes server appear as CDN origin</text>
</svg>
