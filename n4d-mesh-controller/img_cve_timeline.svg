    Mar 2025 = x=70
    Apr 2025 = x=120
    Nov 2025 = x=470
    Feb 12, 2026 = x=70 + (11.4*50) = 70+570 = 640 → let me recalculate

    Actually let me use months from Mar 2025:
    Mar 2025 = month 0 = x=70
    Apr 2025 = month 1 = x=120
    May 2025 = month 2 = x=170
    ...
    Nov 2025 = month 8 = x=470
    Dec 2025 = month 9 = x=520
    Jan 2026 = month 10 = x=570
    Feb 2026 = month 11 = x=620  (Feb 12 ≈ 620, Feb 15 ≈ 622)
    Mar 2026 = month 12 = x=670  (Mar 5 ≈ 678, Mar 15 ≈ 695)
    Apr 2026 = month 13 = x=720  (Apr 8 ≈ 733, Apr 23 ≈ 758)
    May 2026 = month 14 = x=770
    Jun 2026 = month 15 = x=820  (Jun 2 ≈ 823→820, Jun 26 ≈ 843→820)

    Actually let me simplify and compress slightly so it fits:
    Mar 2025 = x=70, Jun 2026 = x=820 (750px / 15.9 months ≈ 47px/month)

    Events:
    Mar 2025:  x=70   (LightLLM issue #784)
    Apr 2025:  x=117  (vLLM CVE-2025-32444)
    Nov 2025:  x=446  (Private LightLLM report)
    Feb 12,26: x=631  (CVE-2026-26220 assigned)
    Mar 5, 26: x=678  (CVE-2026-27944 patch v2.3.3)
    Mar 15,26: x=693  (CVE-2026-33032 patch v2.3.4)
    Apr 8, 26: x=740  (CVE-2026-39987 public)
    Apr 23,26: x=757  (CISA KEV)
    Jun 2, 26: x=820  (NSA/CISA MCP)
    Jun 26,26: x=820  (N4D binary) - put at 820 same spot, annotate below

    Hmm Jun 2 and Jun 26 are close. Let me adjust to 820px total for 16 months (Mar 2025 - Jun 2026):
    Rate = 750/16 = ~47px/month

    Let me use x=70 as Mar 2025, and:
    Mar 2025 = 70
    Apr 2025 = 117
    Jun 2025 = 211
    Nov 2025 = 446
    Feb 2026 = 625 (approx)
    Mar 2026 = 672
    Apr 2026 = 719
    May 2026 = 766
    Jun 2 2026 = 769 (day 2 of month 15)
    Jun 26 2026 = 810

    Actually let me just pick nice round numbers that look good:
  -->

